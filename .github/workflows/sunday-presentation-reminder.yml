name: Sunday Fresh Blends Presentation Reminder

on:
  schedule:
    # 5:00 PM US Eastern every Sunday. GitHub cron is UTC and does NOT adjust
    # for daylight saving: 21:00 UTC = 5 PM EDT (summer) / 4 PM EST (winter).
    # Edit this line to change the time or timezone.
    - cron: '0 21 * * 0'
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open weekly presentation reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              "Time to build this week's **Fresh Blends** presentation. (Sunday 5 PM reminder.)",
              "",
              "**Steps**",
              "1. Make sure the latest info has been fed into #fresh-blends.",
              "2. Copy `vault/12_Presentations/_Weekly_Presentation_Template.md`.",
              "3. Save it as `vault/12_Presentations/" + today + "_Fresh-Blends_Weekly.md`.",
              "4. Fill each section from this week's info and commit.",
              "",
              "See `vault/12_Presentations/_Presentation_System.md` for the full routine."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "📊 Weekly Fresh Blends presentation — " + today,
              body: body
            });
