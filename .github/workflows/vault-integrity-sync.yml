name: Vault Integrity Sync

# Runs daily at 06:00 UTC (02:00 ET during EDT, 01:00 ET during EST)
# Can also be triggered manually via Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run vault-integrity-sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: ./vault
        run: |
          ROUTINE=$(cat 11_Agents/vault-integrity-sync.md)
          claude -p --dangerously-skip-permissions "You are executing the routine defined below. Follow its Steps exactly. Read only the inputs it specifies. Write only the outputs it specifies. Do not ask for confirmation. Append-only for logs; full-rewrite only for claude-memory-sync.md.

          ---

          $ROUTINE

          ---

          Execute now against the current state of this vault (CWD is the vault root)."

      - name: Commit changes
        run: |
          git config user.name "claude-routine-bot"
          git config user.email "claude-routine-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes from vault-integrity-sync"
          else
            git commit -m "vault-integrity-sync: $(date -u +%Y-%m-%d)"
            git push
          fi
